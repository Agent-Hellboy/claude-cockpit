name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: gofmt
        run: test -z "$(gofmt -s -l .)" || { gofmt -s -l .; echo 'run: gofmt -s -w .'; exit 1; }
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1
